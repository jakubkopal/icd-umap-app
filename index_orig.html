<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Delphi ICD-10 Explorer</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #f0f2f5; }
        #plot { width: 95vw; height: 75vh; background: white; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        #info { margin-top: 20px; padding: 20px; border: 1px solid #ccc; border-radius: 8px; width: 80%; background: white; line-height: 1.6; }
        h2 { color: #2c3e50; }
    </style>
</head>
<body>

    <h2>Delphi AI: ICD-10 Embedding Visualization</h2>
    <div id="plot"></div>
    <div id="info"><strong>Comparison Tool:</strong> Click two different points on the UMAP to calculate their Delphi embedding cosine similarity.</div>

    <script>
        let allData = [];
        let selection = [];

        // Loading the CSV - Ensure filename matches exactly!
        d3.csv("embeddings.csv").then(data => {
            allData = data;
            renderPlot(data);
        }).catch(err => {
            document.getElementById('info').innerHTML = "Error loading CSV. Check filename/case.";
            console.error(err);
        });

        function renderPlot(data) {
            const trace = {
                x: data.map(d => +d.umap_x),
                y: data.map(d => +d.umap_y),
                mode: 'markers',
                type: 'scatter',
                text: data.map(d => `${d.name} (${d.icd3})`),
                hoverinfo: 'text',
                marker: { 
                    color: data.map(d => d.color), 
                    size: 10,
                    line: { color: 'white', width: 0.5 }
                }
            };

            const layout = {
                margin: { t: 40, b: 40, l: 40, r: 40 },
                hovermode: 'closest',
                xaxis: { showgrid: false, zeroline: false },
                yaxis: { showgrid: false, zeroline: false }
            };

            Plotly.newPlot('plot', [trace], layout);

            document.getElementById('plot').on('plotly_click', function(data){
                const pointIndex = data.points[0].pointNumber;
                const pointData = allData[pointIndex];
                
                selection.push(pointData);
                if (selection.length > 2) selection.shift();
                updateUI();
            });
        }

        function cosineSimilarity(vecA, vecB) {
            let dotProduct = 0, normA = 0, normB = 0;
            for (let i = 0; i < 120; i++) {
                let a = parseFloat(vecA[`emb_${i}`]);
                let b = parseFloat(vecB[`emb_${i}`]);
                dotProduct += a * b;
                normA += a * a;
                normB += b * b;
            }
            return dotProduct / (Math.sqrt(normA) * Math.sqrt(normB));
        }

        function updateUI() {
            const infoDiv = document.getElementById('info');
            if (selection.length === 2) {
                const sim = cosineSimilarity(selection[0], selection[1]);
                infoDiv.innerHTML = `
                    <div style="display: flex; justify-content: space-around;">
                        <div><strong>Point A:</strong> ${selection[0].name}</div>
                        <div><strong>Point B:</strong> ${selection[1].name}</div>
                    </div>
                    <hr>
                    <div style="text-align: center; font-size: 1.2em;">
                        <strong>Delphi Cosine Similarity:</strong> <span style="color: #2980b9">${sim.toFixed(4)}</span>
                    </div>
                `;
            } else {
                infoDiv.innerHTML = `<strong>Selected:</strong> ${selection[0].name}. Click a second point to compare...`;
            }
        }
    </script>
</body>
</html>
